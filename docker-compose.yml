 
version: '3.8'

services:
  zktls-attestator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zktls-attestator
    restart: unless-stopped
    # Host 3002 -> container PORT (must match `environment.PORT`; app listens on that port inside the container)
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3002
    volumes:
      - ./logs:/home/appuser/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
